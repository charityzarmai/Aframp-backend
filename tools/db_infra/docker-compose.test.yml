version: '3.8'
services:
  primary:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shard1
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata_primary:/var/lib/postgresql/data

  replica:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shard1
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata_replica:/var/lib/postgresql/data

  shard2:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shard2
    ports:
      - "5434:5432"
    volumes:
      - ./pgdata_shard2:/var/lib/postgresql/data

# NOTE: This compose file starts three separate Postgres instances. Setting up real streaming replication and
# partitioning requires init scripts or manual steps. Use this as an integration scaffold; CI should configure
# replication and create shard partitions before running integration tests.
