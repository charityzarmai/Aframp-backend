# Prometheus Alerting Rules for Microservice Authentication
# Deploy these rules to your Prometheus instance

groups:
  - name: service_authentication
    interval: 30s
    rules:
      # Critical: Token refresh failure
      - alert: ServiceTokenRefreshFailure
        expr: increase(aframp_service_token_refresh_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          component: service_auth
        annotations:
          summary: "Service {{ $labels.service_name }} token refresh failed"
          description: |
            Service {{ $labels.service_name }} failed to refresh its access token after all retry attempts.
            This will cause service-to-service communication to fail once the current token expires.
            
            Current failure count: {{ $value }}
            
            Action required:
            1. Check service logs for detailed error messages
            2. Verify OAuth token endpoint is accessible
            3. Verify service credentials are valid
            4. Check network connectivity
          runbook_url: https://docs.aframp.com/runbooks/service-token-refresh-failure

      # Critical: Certificate expiring soon
      - alert: ServiceCertificateExpiringSoon
        expr: (service_certificate_expiry_timestamp - time()) / 86400 < 30
        for: 1h
        labels:
          severity: critical
          component: service_auth
        annotations:
          summary: "Service {{ $labels.service_name }} certificate expires in {{ $value }} days"
          description: |
            mTLS certificate for service {{ $labels.service_name }} will expire in {{ $value }} days.
            
            Certificate serial: {{ $labels.serial_number }}
            Expires at: {{ $labels.expires_at }}
            
            Action required:
            1. Rotate certificate using admin API
            2. Verify new certificate is deployed
            3. Monitor for any mTLS connection issues
          runbook_url: https://docs.aframp.com/runbooks/certificate-rotation

      # Critical: Service impersonation attempt
      - alert: ServiceImpersonationAttempt
        expr: increase(aframp_service_call_authorization_denials_total{reason="impersonation"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          component: service_auth
          security: true
        annotations:
          summary: "Service impersonation attempt detected"
          description: |
            A service attempted to impersonate another service.
            
            Calling service: {{ $labels.calling_service }}
            Target endpoint: {{ $labels.endpoint }}
            Attempts in last 5m: {{ $value }}
            
            This is a potential security incident.
            
            Action required:
            1. Review service_auth_audit table for details
            2. Identify source IP and service instance
            3. Investigate if credentials were compromised
            4. Consider revoking service credentials
            5. Escalate to security team
          runbook_url: https://docs.aframp.com/runbooks/service-impersonation

      # Warning: High authorization denial rate
      - alert: HighServiceAuthorizationDenialRate
        expr: |
          (
            sum(rate(aframp_service_call_authorization_denials_total[5m])) by (calling_service)
            /
            sum(rate(aframp_service_call_authentications_total[5m])) by (calling_service)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          component: service_auth
        annotations:
          summary: "High authorization denial rate for {{ $labels.calling_service }}"
          description: |
            Service {{ $labels.calling_service }} has a high authorization denial rate: {{ $value | humanizePercentage }}
            
            This indicates the service is attempting to call endpoints it's not authorized for.
            
            Action required:
            1. Review service call allowlist configuration
            2. Check if service is calling correct endpoints
            3. Update allowlist if legitimate traffic
            4. Investigate if service behavior changed
          runbook_url: https://docs.aframp.com/runbooks/high-denial-rate

      # Warning: Token acquisition slow
      - alert: SlowServiceTokenAcquisition
        expr: |
          histogram_quantile(0.95,
            rate(aframp_service_token_acquisition_duration_seconds_bucket[5m])
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          component: service_auth
        annotations:
          summary: "Slow token acquisition for {{ $labels.service_name }}"
          description: |
            95th percentile token acquisition time for {{ $labels.service_name }}: {{ $value }}s
            
            This may indicate OAuth server performance issues.
            
            Action required:
            1. Check OAuth server metrics
            2. Verify network latency
            3. Check for rate limiting
          runbook_url: https://docs.aframp.com/runbooks/slow-token-acquisition

      # Warning: No token refresh in expected window
      - alert: ServiceTokenNotRefreshing
        expr: |
          (time() - aframp_service_token_last_refresh_timestamp) > 1800
        for: 5m
        labels:
          severity: warning
          component: service_auth
        annotations:
          summary: "Service {{ $labels.service_name }} token not refreshing"
          description: |
            Service {{ $labels.service_name }} has not refreshed its token in {{ $value }}s (expected every ~720s).
            
            This may indicate:
            - Background refresh task crashed
            - Service is not making any requests
            - Token manager is stuck
            
            Action required:
            1. Check service health
            2. Review service logs
            3. Verify background task is running
          runbook_url: https://docs.aframp.com/runbooks/token-not-refreshing

      # Info: Service registered
      - alert: NewServiceRegistered
        expr: changes(aframp_service_registrations_total[5m]) > 0
        for: 0m
        labels:
          severity: info
          component: service_auth
        annotations:
          summary: "New service registered"
          description: |
            A new service was registered in the system.
            
            Total services: {{ $value }}
            
            Action: Review and verify this is expected.

      # Warning: Allowlist cache miss rate high
      - alert: HighAllowlistCacheMissRate
        expr: |
          (
            rate(aframp_service_allowlist_cache_misses_total[5m])
            /
            rate(aframp_service_allowlist_checks_total[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          component: service_auth
        annotations:
          summary: "High allowlist cache miss rate"
          description: |
            Allowlist cache miss rate: {{ $value | humanizePercentage }}
            
            This may indicate:
            - Redis unavailable or slow
            - Cache invalidation too frequent
            - Memory cache not working
            
            Action required:
            1. Check Redis health
            2. Review cache invalidation patterns
            3. Check memory cache configuration
          runbook_url: https://docs.aframp.com/runbooks/cache-miss-rate

  - name: service_authentication_slo
    interval: 1m
    rules:
      # SLO: 99.9% authentication success rate
      - alert: ServiceAuthenticationSLOBreach
        expr: |
          (
            sum(rate(aframp_service_call_authentications_total{result="success"}[5m]))
            /
            sum(rate(aframp_service_call_authentications_total[5m]))
          ) < 0.999
        for: 5m
        labels:
          severity: critical
          component: service_auth
          slo: true
        annotations:
          summary: "Service authentication SLO breach"
          description: |
            Service authentication success rate: {{ $value | humanizePercentage }}
            SLO target: 99.9%
            
            This indicates a systemic issue with service authentication.
            
            Action required:
            1. Check for widespread token refresh failures
            2. Verify OAuth server health
            3. Check database and Redis health
            4. Review recent configuration changes
          runbook_url: https://docs.aframp.com/runbooks/auth-slo-breach

      # SLO: 99% authorization success rate (for allowed services)
      - alert: ServiceAuthorizationSLOBreach
        expr: |
          (
            sum(rate(aframp_service_call_authentications_total{result="success"}[5m]))
            /
            (
              sum(rate(aframp_service_call_authentications_total{result="success"}[5m]))
              +
              sum(rate(aframp_service_call_authorization_denials_total{reason!="not_allowed"}[5m]))
            )
          ) < 0.99
        for: 5m
        labels:
          severity: warning
          component: service_auth
          slo: true
        annotations:
          summary: "Service authorization SLO breach"
          description: |
            Service authorization success rate: {{ $value | humanizePercentage }}
            SLO target: 99%
            
            This excludes legitimate denials (not in allowlist).
            
            Action required:
            1. Review authorization denial reasons
            2. Check for configuration issues
            3. Verify allowlist is up to date
          runbook_url: https://docs.aframp.com/runbooks/authz-slo-breach

  - name: service_authentication_capacity
    interval: 1m
    rules:
      # Capacity: High token acquisition rate
      - alert: HighServiceTokenAcquisitionRate
        expr: |
          sum(rate(aframp_service_token_acquisitions_total[5m])) by (service_name) > 10
        for: 5m
        labels:
          severity: warning
          component: service_auth
        annotations:
          summary: "High token acquisition rate for {{ $labels.service_name }}"
          description: |
            Service {{ $labels.service_name }} is acquiring tokens at {{ $value }} per second.
            
            This may indicate:
            - Service is restarting frequently
            - Token manager is not caching properly
            - Multiple instances starting simultaneously
            
            Action required:
            1. Check service restart frequency
            2. Verify token caching is working
            3. Review deployment patterns
          runbook_url: https://docs.aframp.com/runbooks/high-token-acquisition

      # Capacity: High authentication request rate
      - alert: HighServiceAuthenticationRate
        expr: |
          sum(rate(aframp_service_call_authentications_total[5m])) > 1000
        for: 5m
        labels:
          severity: info
          component: service_auth
        annotations:
          summary: "High service authentication rate"
          description: |
            Service authentication rate: {{ $value }} requests/second
            
            This is informational - system is handling high load.
            Monitor for performance degradation.
