name: Security Audit #156

on:
  pull_request:
    branches: [main, develop, staging]
  push:
    branches: [main]
  schedule:
    - cron: "0 1 * * 1" # weekly Monday 01:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --deny warnings

  snyk-scan:
    name: Snyk open source scan
    runs-on: ubuntu-latest
    if: ${{ secrets.SNYK_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk OSS scan (Cargo)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth $SNYK_TOKEN
          snyk test --all-projects --severity-threshold=high

      - name: Upload SARIF to GitHub Security tab
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --all-projects --sarif-file-output=snyk.sarif || true
        continue-on-error: true

      - name: Publish SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

  owasp-zap-baseline:
    name: OWASP ZAP baseline scan
    runs-on: ubuntu-latest
    if: ${{ vars.SECURITY_SCAN_TARGET_URL != '' }}
    steps:
      - name: Run ZAP baseline against target
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ vars.SECURITY_SCAN_TARGET_URL }}
          cmd_options: "-a"

  manual-review-checkpoint:
    name: Manual review checkpoint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure manual review guide exists
        run: test -f docs/security/AUDIT_156_SECURITY_REVIEW.md
