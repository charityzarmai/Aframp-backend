---
# ============================================================================
# Production Operations Alerting Rules
# ============================================================================
# Prometheus alerting rules for database maintenance, memory health,
# reconciliation drift, and log delivery monitoring.
# ============================================================================

groups:
  # ==========================================================================
  # Database Maintenance Alerts
  # ==========================================================================
  - name: database_maintenance
    interval: 60s
    rules:
      - alert: HighDatabaseLockTime
        expr: |
          rate(pg_stat_database_blks_hit{datname="aframp"}[5m]) / 
          rate(pg_stat_database_blks_read{datname="aframp"}[5m]) < 0.95
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High database lock contention detected"
          description: "Database {{ $labels.datname }} has P99 locks exceeding 5ms threshold"

      - alert: PartitionCreationFailure
        expr: |
          increase(partition_management_log_failures_total[1h]) > 0
        for: 5m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Partition creation failed"
          description: "Failed to create partitions for table {{ $labels.table_name }}"

      - alert: AutovacuumStalled
        expr: |
          pg_stat_user_tables_last_autovacuum{schemaname="public"} < (time() - 86400)
        for: 1h
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Autovacuum has not run in 24 hours"
          description: "Table {{ $labels.relname }} autovacuum last ran {{ $value }}s ago"

      - alert: HighTableBloat
        expr: |
          (pg_stat_user_tables_n_dead_tup / (pg_stat_user_tables_n_live_tup + 1)) > 0.2
        for: 30m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High table bloat detected"
          description: "Table {{ $labels.relname }} has {{ $value | humanizePercentage }} dead rows"

      - alert: PartitionSizeExceeded
        expr: |
          pg_table_size_bytes{table=~".*_\\d{4}_\\d{2}_\\d{2}"} > 10737418240
        for: 15m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Partition size exceeded threshold"
          description: "Partition {{ $labels.table }} size is {{ $value | humanize1024 }}B"

  # ==========================================================================
  # Memory & Performance Alerts
  # ==========================================================================
  - name: memory_performance
    interval: 30s
    rules:
      - alert: MemoryLeakDetected
        expr: |
          (
            avg_over_time(process_resident_memory_bytes{job="aframp-backend"}[1h]) - 
            avg_over_time(process_resident_memory_bytes{job="aframp-backend"}[1h] offset 1h)
          ) > 104857600
        for: 2h
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Potential memory leak detected"
          description: "Memory usage increased by {{ $value | humanize1024 }}B over 2 hours on {{ $labels.pod }}"

      - alert: MemoryUsageHigh
        expr: |
          (process_resident_memory_bytes / process_virtual_memory_max_bytes) > 0.85
        for: 10m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High memory utilization"
          description: "Pod {{ $labels.pod }} using {{ $value | humanizePercentage }} of available memory"

      - alert: HighAllocationRate
        expr: |
          rate(memory_allocations_total{job="aframp-backend"}[5m]) > 100000
        for: 15m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High memory allocation rate"
          description: "Pod {{ $labels.pod }} allocating {{ $value }} objects/sec"

      - alert: HeapFragmentation
        expr: |
          (memory_heap_allocated_bytes - memory_heap_inuse_bytes) / memory_heap_allocated_bytes > 0.3
        for: 30m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High heap fragmentation detected"
          description: "Heap fragmentation at {{ $value | humanizePercentage }} on {{ $labels.pod }}"

      - alert: HighCPUUsage
        expr: |
          rate(process_cpu_seconds_total{job="aframp-backend"}[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High CPU utilization"
          description: "Pod {{ $labels.pod }} using {{ $value | humanizePercentage }} CPU"

  # ==========================================================================
  # Financial Reconciliation Alerts
  # ==========================================================================
  - name: reconciliation
    interval: 60s
    rules:
      - alert: ReconciliationDriftDetected
        expr: |
          abs(reconciliation_balance_drift_stroops) > 50000000
        for: 5m
        labels:
          severity: critical
          component: reconciliation
        annotations:
          summary: "Ledger drift exceeds threshold"
          description: "Balance drift of {{ $value }} stroops detected ({{ $labels.stellar_account_id }})"

      - alert: ReconciliationFailed
        expr: |
          increase(reconciliation_failures_total[1h]) > 2
        for: 5m
        labels:
          severity: critical
          component: reconciliation
        annotations:
          summary: "Multiple reconciliation failures"
          description: "{{ $value }} reconciliation failures in the last hour"

      - alert: CircuitBreakerTripped
        expr: |
          circuit_breaker_is_tripped{circuit_name=~".*"} == 1
        for: 1m
        labels:
          severity: critical
          component: reconciliation
        annotations:
          summary: "Circuit breaker tripped"
          description: "Circuit breaker {{ $labels.circuit_name }} has been tripped: {{ $labels.trip_reason }}"

      - alert: HighOperationsBlocked
        expr: |
          rate(circuit_breaker_operations_blocked_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: reconciliation
        annotations:
          summary: "High number of operations blocked"
          description: "{{ $value }} operations/sec blocked by circuit breaker {{ $labels.circuit_name }}"

      - alert: ReconciliationSlow
        expr: |
          reconciliation_duration_seconds > 30
        for: 10m
        labels:
          severity: warning
          component: reconciliation
        annotations:
          summary: "Reconciliation running slowly"
          description: "Reconciliation taking {{ $value }}s (target: <30s)"

      - alert: TransactionVerificationFailed
        expr: |
          (reconciliation_transactions_verified / reconciliation_transactions_total) < 0.95
        for: 15m
        labels:
          severity: warning
          component: reconciliation
        annotations:
          summary: "Low transaction verification rate"
          description: "Only {{ $value | humanizePercentage }} of transactions verified successfully"

  # ==========================================================================
  # Log Management Alerts
  # ==========================================================================
  - name: log_management
    interval: 60s
    rules:
      - alert: LogDeliveryRateLow
        expr: |
          rate(vector_events_out_total[5m]) / rate(vector_events_in_total[5m]) < 0.99
        for: 10m
        labels:
          severity: warning
          component: logging
        annotations:
          summary: "Log delivery rate below 100%"
          description: "Vector log delivery at {{ $value | humanizePercentage }} (target: 100%)"

      - alert: LogProcessingBacklog
        expr: |
          vector_buffer_events > 10000
        for: 15m
        labels:
          severity: warning
          component: logging
        annotations:
          summary: "Log processing backlog detected"
          description: "{{ $value }} events buffered in Vector on {{ $labels.pod }}"

      - alert: CriticalLogVolumeHigh
        expr: |
          rate(log_messages_total{level="error"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: logging
        annotations:
          summary: "High critical log volume"
          description: "{{ $value }} error logs/sec from {{ $labels.service }}"

      - alert: LogRotationFailed
        expr: |
          time() - log_rotation_last_success_timestamp > 86400
        for: 1h
        labels:
          severity: warning
          component: logging
        annotations:
          summary: "Log rotation has not succeeded in 24 hours"
          description: "Last successful rotation was {{ $value }}s ago"

      - alert: S3UploadFailed
        expr: |
          increase(log_s3_upload_failures_total[1h]) > 5
        for: 5m
        labels:
          severity: warning
          component: logging
        annotations:
          summary: "Multiple S3 log upload failures"
          description: "{{ $value }} S3 uploads failed in the last hour"

      - alert: DiskSpaceLogPartition
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/var/log"} / node_filesystem_size_bytes{mountpoint="/var/log"}) < 0.15
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Low disk space on log partition"
          description: "Only {{ $value | humanizePercentage }} space remaining on /var/log"

  # ==========================================================================
  # System Health Alerts
  # ==========================================================================
  - name: system_health
    interval: 30s
    rules:
      - alert: HighLoadAverage
        expr: |
          node_load15 / count(node_cpu_seconds_total{mode="idle"}) by (instance) > 0.8
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High system load average"
          description: "Load average {{ $value }} on {{ $labels.instance }}"

      - alert: DiskIOSaturation
        expr: |
          rate(node_disk_io_time_seconds_total[5m]) > 0.9
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Disk I/O saturation detected"
          description: "Disk {{ $labels.device }} at {{ $value | humanizePercentage }} utilization"

      - alert: NetworkErrorsHigh
        expr: |
          rate(node_network_receive_errs_total[5m]) + rate(node_network_transmit_errs_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High network error rate"
          description: "{{ $value }} network errors/sec on {{ $labels.device }}"

  # ==========================================================================
  # Performance SLA Monitoring
  # ==========================================================================
  - name: performance_sla
    interval: 60s
    rules:
      - alert: P99LatencyExceeded
        expr: |
          histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 10m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "P99 latency exceeds 1 second"
          description: "P99 latency is {{ $value }}s for {{ $labels.endpoint }}"

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "High error rate detected"
          description: "Error rate at {{ $value | humanizePercentage }} for {{ $labels.endpoint }}"

      - alert: DatabaseQuerySlow
        expr: |
          histogram_quantile(0.99, rate(database_query_duration_seconds_bucket[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "P99 query time is {{ $value }}s for {{ $labels.query_type }}"
