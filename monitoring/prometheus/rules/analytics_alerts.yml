groups:
  - name: consumer_analytics
    interval: 60s
    rules:
      # Alert when snapshot generation fails
      - alert: AnalyticsSnapshotGenerationFailed
        expr: |
          increase(aframp_analytics_snapshots_generated_total{status="failed"}[1h]) > 0
        for: 5m
        labels:
          severity: critical
          domain: analytics
        annotations:
          summary: "Analytics snapshot generation failed"
          description: "Snapshot generation for period {{ $labels.period }} has failed in the last hour"
          runbook: "Check analytics worker logs and database connectivity"

      # Alert when snapshot generation is taking too long
      - alert: AnalyticsSnapshotGenerationSlow
        expr: |
          histogram_quantile(0.95, 
            rate(aframp_analytics_snapshot_generation_duration_seconds_bucket[5m])
          ) > 120
        for: 10m
        labels:
          severity: warning
          domain: analytics
        annotations:
          summary: "Analytics snapshot generation is slow"
          description: "95th percentile snapshot generation time is {{ $value }}s (threshold: 120s)"
          runbook: "Review audit log query performance and consider optimization"

      # Alert when at-risk consumer count exceeds threshold
      - alert: HighAtRiskConsumerCount
        expr: |
          aframp_analytics_at_risk_consumers_total > 10
        for: 15m
        labels:
          severity: warning
          domain: analytics
        annotations:
          summary: "High number of at-risk consumers"
          description: "{{ $value }} consumers are currently flagged as at-risk"
          runbook: "Review consumer health dashboard and investigate common risk factors"

      # Alert when critical at-risk consumer count
      - alert: CriticalAtRiskConsumerCount
        expr: |
          aframp_analytics_at_risk_consumers_total > 25
        for: 5m
        labels:
          severity: critical
          domain: analytics
        annotations:
          summary: "Critical number of at-risk consumers"
          description: "{{ $value }} consumers are at-risk - potential platform-wide issue"
          runbook: "Investigate platform health, check for service degradation or breaking changes"

      # Alert on high anomaly detection rate
      - alert: HighUsageAnomalyRate
        expr: |
          sum(rate(aframp_analytics_anomalies_detected_total[1h])) > 5
        for: 10m
        labels:
          severity: warning
          domain: analytics
        annotations:
          summary: "High rate of usage anomalies detected"
          description: "{{ $value }} anomalies detected per second in the last hour"
          runbook: "Review anomaly dashboard and investigate common patterns"

      # Alert when no snapshots generated in expected window
      - alert: AnalyticsSnapshotGenerationStalled
        expr: |
          (time() - max(aframp_worker_last_cycle_timestamp_seconds{worker="analytics"})) > 7200
        for: 5m
        labels:
          severity: critical
          domain: analytics
        annotations:
          summary: "Analytics snapshot generation has stalled"
          description: "No snapshots generated in the last 2 hours"
          runbook: "Check analytics worker status and restart if necessary"

      # Alert on declining platform-wide consumer health
      - alert: PlatformConsumerHealthDeclining
        expr: |
          avg(aframp_analytics_consumer_health_score) < 70
        for: 30m
        labels:
          severity: warning
          domain: analytics
        annotations:
          summary: "Platform-wide consumer health is declining"
          description: "Average consumer health score is {{ $value }} (threshold: 70)"
          runbook: "Review platform stability, error rates, and recent changes"
