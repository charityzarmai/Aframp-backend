# Prometheus alerting rules for microservice authentication
# Deploy to your Prometheus instance

groups:
  - name: service_auth
    interval: 30s
    rules:
      # Critical: Token refresh failure
      - alert: ServiceTokenRefreshFailure
        expr: increase(aframp_service_token_refresh_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          component: service_auth
        annotations:
          summary: "Service {{ $labels.service_name }} token refresh failed"
          description: |
            Service {{ $labels.service_name }} has failed to refresh its authentication token.
            This will cause service-to-service calls to fail once the current token expires.
            
            Current failures: {{ $value }}
            
            Action required:
            1. Check service logs for detailed error messages
            2. Verify OAuth token endpoint is accessible
            3. Verify service credentials are correct
            4. Check networ